<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阅读文章</title>
    <style>
        body { background: white; color: black; font-family: 'Helvetica Neue', sans-serif; margin: 0; padding: 0; }
        .header { border-bottom: 2px solid black; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
        .home-btn { border: 2px solid black; padding: 10px 20px; text-decoration: none; color: black; font-weight: bold; text-transform: uppercase; }
        .home-btn:hover { background: black; color: white; }
        .content { max-width: 800px; margin: 50px auto; padding: 0 20px; line-height: 1.8; font-size: 18px; word-break: break-all;}
        .content h1, .content h2, .content h3 { border-bottom: 1px solid #eee; padding-bottom: 10px; margin-top: 32px; }
        .custom-code-block {
            background: #f4f4f4;
            border: 2px solid #666;
            border-radius: 8px;
            margin: 24px 0;
            padding: 16px;
            overflow-x: auto;
        }
        .custom-code-block pre {
            margin: 0;
            background: transparent;
            color: #222;
            font-size: 16px;
            font-family: "Fira Mono", "monospace", "Consolas";
        }
    </style>
</head>
<body>
    <div class="header">
        <div>zhizi's Blog</div>
        <a href="index.html" class="home-btn">Home</a>
    </div>
    <div class="content" id="markdownContent">
        <p style="text-align: center;">正在加载文章...</p>
    </div>
    <script>
        // 获取URL中的 file 参数
        const urlParams = new URLSearchParams(window.location.search);
        const file = urlParams.get('file');
        const markdownDiv = document.getElementById('markdownContent');

        function escapeHtml(str) {
            return str.replace(/[&<>"']/g, (c) =>
                ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]
            );
        }

        function customMarkdownParse(md) {
            const lines = md.split('\n');
            let html = '';
            let inCode = false;
            let codeBuffer = [];
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];

                if (!inCode && line.trim().startsWith('~~~')) {
                    inCode = true;
                    codeBuffer = [];
                } else if (inCode && line.trim().startsWith('~~~')) {
                    // 代码块结束
                    html += `<div class="custom-code-block"><pre><code>${escapeHtml(codeBuffer.join('\n'))}</code></pre></div>\n`;
                    inCode = false;
                } else if (inCode) {
                    codeBuffer.push(line);
                } else if (/^#{1,3} /.test(line)) {
                    // 支持 # ## ### 标题
                    const pounds = line.match(/^#{1,3}/)[0].length;
                    const content = escapeHtml(line.slice(pounds + 1));
                    html += `<h${pounds}>${content}</h${pounds}>\n`;
                } else if (line.trim() === '') {
                    html += '';
                } else {
                    html += `<p>${escapeHtml(line)}</p>\n`;
                }
            }
            // 防止最后没关的代码块
            if (inCode && codeBuffer.length) {
                html += `<div class="custom-code-block"><pre><code>${escapeHtml(codeBuffer.join('\n'))}</code></pre></div>\n`;
            }
            return html;
        }

        if (file) {
            fetch('blog/' + file)
                .then(res => {
                    if (!res.ok) throw new Error("文章不存在");
                    return res.text();
                })
                .then(md => {
                    markdownDiv.innerHTML = customMarkdownParse(md);
                })
                .catch(err => {
                    markdownDiv.innerHTML = `<h2 style="color: red;">404 文章未找到</h2><p>请确认 blog 文件夹下是否有 ${file} 文件。</p>`;
                });
        } else {
            markdownDiv.innerHTML = "<p>请选择一篇文章阅读。</p>";
        }
    </script>
</body>
</html>
