<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picture List</title>
    <style>
        body { background: white; color: black; font-family: 'Helvetica Neue', sans-serif; padding: 40px; }
        h1 { border-bottom: 3px solid black; padding-bottom: 20px; margin-bottom: 40px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .card { border: 2px solid black; height: 200px; overflow: hidden; position: relative; }
        .card img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .card:hover { opacity: 0.8; }
        .card a { display: block; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div style="max-width: 1000px; margin: 0 auto;">
        <h1>Gallery</h1>
        <div class="grid" id="imageGrid"></div>
        <div style="margin-top: 40px; border-top: 2px solid black; padding-top: 20px;">
            <a href="index.html" style="text-decoration: none; color: black; font-weight: bold;">← Back to Home</a>
        </div>
    </div>
    <script>
        fetch('picture_list.txt')
            .then(res => res.text())
            .then(text => {
                const images = text.split('\n').filter(line => line.trim() !== '');
                const grid = document.getElementById('imageGrid');
                images.forEach(img => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <a href="picture/${img}" target="_blank" title="点击查看原图">
                            <img src="picture/${img}" alt="${img}">
                        </a>
                    `;
                    grid.appendChild(card);
                });
            });
    </script>
</body>
</html>
