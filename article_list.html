<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article List</title>
    <style>
        body { background: white; color: black; font-family: 'Helvetica Neue', sans-serif; padding: 40px; }
        h1 { border-bottom: 3px solid black; padding-bottom: 20px; margin-bottom: 40px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        /* 修改了下面这几行 */
        .card { 
            border: 2px solid black; 
            height: 200px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 28px;      /* 字体加大到28px */
            font-weight: bold;    /* 加粗 */
            transition: 0.2s; 
            cursor: pointer; 
            text-align: center; 
            padding: 10px; 
            box-sizing: border-box; 
            word-break: break-word; /* 防止长标题撑破卡片 */
        }
        .card:hover { background: black; color: white; }
        .card a { 
            color: inherit; 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            height: 100%; 
        }
    </style>
</head>
<body>
    <div style="max-width: 1000px; margin: 0 auto;">
        <h1>All Articles</h1>
        <div class="grid" id="articleGrid">
            <!-- JS 填入 -->
        </div>
        <div style="margin-top: 40px; border-top: 2px solid black; padding-top: 20px;">
            <a href="index.html" style="text-decoration: none; color: black; font-weight: bold;">← Back to Home</a>
        </div>
    </div>
    <script>
        fetch('article_list.txt')
            .then(res => res.text())
            .then(text => {
                const files = text.split('\n').filter(line => line.trim() !== '');
                const grid = document.getElementById('articleGrid');
                files.forEach(file => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    // 去掉 .md 后缀让标题好看点 (可选)
                    const title = file.replace('.md', ''); 
                    card.innerHTML = `<a href="read.html?file=${file}">${title}</a>`;
                    grid.appendChild(card);
                });
            });
    </script>
</body>
</html>
